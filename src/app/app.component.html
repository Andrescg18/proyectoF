<div class="app-container">
  <!-- Top Navbar -->
  <header class="top-navbar">
    <div class="nav-left">
      <div class="brand">
        <span class="brand-icon">⚡</span>
        <span class="brand-name">Aura Market</span>
      </div>
    </div>

    <nav class="nav-center">
      <a routerLink="/home" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Inicio</span>
      </a>
      <a routerLink="/search" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🔍</span>
        <span class="nav-label">Buscar</span>
      </a>
      <a routerLink="/favorites" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">❤️</span>
        <span class="nav-label">Favoritos</span>
      </a>
      <a routerLink="/cart" routerLinkActive="active" class="nav-item cart-nav-item">
        <span class="nav-icon">🛒</span>
        <span class="nav-label">Carrito</span>
        @if (cartService.totalItems() > 0) {
          <span class="cart-badge">{{ cartService.totalItems() }}</span>
        }
      </a>
    </nav>

    <div class="nav-right">
      <div class="api-status">
        <span class="status-indicator online"></span>
        <span class="status-text">API Online</span>
      </div>
      <div class="user-profile">
        <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=80" alt="Avatar" class="avatar">
      </div>
    </div>
  </header>

  <!-- Main View Panel -->
  <main class="content-panel">
    <router-outlet></router-outlet>
  </main>
</div>
