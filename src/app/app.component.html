<div class="dashboard-container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">⚡</span>
      <span class="brand-name">Aura Market</span>
    </div>
    
    <nav class="sidebar-nav">
      <a routerLink="/home" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Inicio</span>
      </a>
      <a routerLink="/search" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🔍</span>
        <span class="nav-label">Buscar</span>
      </a>
      <a routerLink="/favorites" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">❤️</span>
        <span class="nav-label">Favoritos</span>
      </a>
      <a routerLink="/details/1" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📦</span>
        <span class="nav-label">Detalle (ID: 1)</span>
      </a>
      <a routerLink="/some-invalid-route" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">⚠️</span>
        <span class="nav-label">Error 404</span>
      </a>
    </nav>
    
    <div class="sidebar-footer">
      <div class="milestone-badge">Día 3 Milestone</div>
      <span class="version-label">v1.0.0</span>
    </div>
  </aside>

  <!-- Main Content Wrapper -->
  <div class="main-wrapper">
    <!-- Top Header -->
    <header class="top-header">
      <div class="header-left">
        <button class="menu-toggle-btn">
          <span>☰</span>
        </button>
        <h1 class="header-title">E-commerce Portal</h1>
      </div>
      
      <div class="header-right">
        <div class="api-status">
          <span class="status-indicator online"></span>
          <span class="status-text">Core API Online</span>
        </div>
        <div class="user-profile">
          <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=80" alt="Avatar" class="avatar">
        </div>
      </div>
    </header>

    <!-- Main View Panel -->
    <main class="content-panel">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
