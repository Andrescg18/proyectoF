<div class="empty-state-container fade-in">
  <div class="icon-wrapper glass">
    @switch (iconType) {
      @case ('cart') {
        <svg class="empty-icon cart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/>
          <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/>
          <path d="m16 9-4 4-2-2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      }
      @case ('favorites') {
        <svg class="empty-icon favorites" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
          <path d="M12 11v3M10.5 12.5h3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      }
      @case ('search') {
        <svg class="empty-icon search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
          <path d="M8 11h6M11 8v6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      }
      @case ('error') {
        <svg class="empty-icon error" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/>
          <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      }
    }
  </div>
  
  <h2 class="empty-title">{{ title }}</h2>
  <p class="empty-message">{{ message }}</p>
  
  @if (actionText && actionRoute) {
    <a [routerLink]="actionRoute" class="glow-btn">{{ actionText }}</a>
  }
</div>
